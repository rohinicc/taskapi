<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskAPI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #1e293b; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: .5rem; }
  .sub { color: #64748b; margin-bottom: 2rem; }

  .card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .card h2 { margin-bottom: 1rem; font-size: 1.1rem; }

  .row { display: flex; gap: .5rem; margin-bottom: .75rem; flex-wrap: wrap; }
  input, textarea { padding: .5rem .75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: .9rem; flex: 1; min-width: 150px; }
  textarea { resize: vertical; }
  button { padding: .5rem 1rem; border: none; border-radius: 6px; font-size: .9rem; cursor: pointer; background: #3b82f6; color: #fff; }
  button:hover { opacity: .85; }
  button.danger { background: #ef4444; }
  button.small { padding: .25rem .6rem; font-size: .8rem; }
  button.green { background: #22c55e; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: .6rem .5rem; border-bottom: 1px solid #e2e8f0; }
  th { font-weight: 600; color: #475569; font-size: .85rem; }
  .actions { display: flex; gap: .3rem; }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: .8rem; }
  .badge.done { background: #dcfce7; color: #166534; }
  .badge.pending { background: #fef9c3; color: #854d0e; }

  #toast { visibility: hidden; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: .75rem 1.5rem; border-radius: 8px; font-size: .9rem; }
  #toast.show { visibility: visible; }
  .empty { color: #94a3b8; text-align: center; padding: 2rem; }
</style>
</head>
<body>
<div class="container">
  <h1>TaskAPI</h1>
  <p class="sub">FastAPI + PostgreSQL + Redis</p>

  <div class="card">
    <h2>Create Task</h2>
    <div class="row">
      <input id="newTitle" placeholder="Title *" required>
      <textarea id="newDesc" placeholder="Description (optional)" rows="1"></textarea>
      <button class="green" onclick="createTask()">Create</button>
    </div>
  </div>

  <div class="card">
    <h2>Tasks</h2>
    <div id="taskList">
      <div class="empty">Loading...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api/v1/tasks';

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show';
  setTimeout(() => el.className = '', 2500);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok && res.status !== 404) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || res.statusText); }
  return res.status === 204 ? null : await res.json().catch(() => null);
}

async function loadTasks() {
  try {
    const tasks = await api('GET', '/');
    const el = document.getElementById('taskList');
    if (!tasks || tasks.length === 0) { el.innerHTML = '<div class="empty">No tasks yet. Create one above.</div>'; return; }
    el.innerHTML = `<table><thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Status</th><th>Actions</th></tr></thead><tbody>${tasks.map(t => `
      <tr>
        <td>${t.id}</td>
        <td>${esc(t.title)}</td>
        <td>${esc(t.description || '—')}</td>
        <td><span class="badge ${t.completed ? 'done' : 'pending'}">${t.completed ? 'Done' : 'Pending'}</span></td>
        <td class="actions">
          <button class="small" onclick="toggleTask(${t.id}, ${!t.completed})">${t.completed ? 'Undo' : 'Done'}</button>
          <button class="small danger" onclick="deleteTask(${t.id})">Delete</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
  } catch (e) { document.getElementById('taskList').innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function createTask() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { toast('Title is required'); return; }
  const desc = document.getElementById('newDesc').value.trim() || null;
  try {
    await api('POST', '/', { title, description: desc });
    document.getElementById('newTitle').value = '';
    document.getElementById('newDesc').value = '';
    toast('Task created');
    loadTasks();
  } catch (e) { toast(e.message); }
}

async function toggleTask(id, completed) {
  try { await api('PUT', '/' + id, { completed }); toast('Updated'); loadTasks(); }
  catch (e) { toast(e.message); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try { await api('DELETE', '/' + id); toast('Deleted'); loadTasks(); }
  catch (e) { toast(e.message); }
}

loadTasks();
</script>
</body>
</html>
